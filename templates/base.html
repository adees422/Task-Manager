<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Team Task Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* All CSS will be here to avoid missing file issues */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0B0F1C 0%, #0A0E1A 100%);
            color: #E8EDF5;
            min-height: 100vh;
        }

        /* Auth Styles */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-grid {
            display: flex;
            max-width: 1200px;
            width: 100%;
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            overflow: hidden;
        }

        .auth-hero {
            flex: 1;
            padding: 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(9, 9, 121, 0.2));
        }

        .hero-icon i {
            font-size: 64px;
            color: #58A6FF;
        }

        .auth-hero h1 {
            font-size: 40px;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-features {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .hero-features span {
            font-size: 13px;
            background: rgba(88, 166, 255, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
        }

        .auth-card {
            flex: 1;
            padding: 40px;
        }

        .auth-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #8B9BB5;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .tab.active {
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            color: white;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .input-field {
            position: relative;
            margin-bottom: 20px;
        }

        .input-field i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #58A6FF;
        }

        .input-field input, .input-field select, .input-field textarea {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: #111827;
            border: 1px solid #2D3A5E;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }

        .input-field textarea {
            padding-top: 12px;
            resize: vertical;
        }

        .input-field input:focus, .input-field select:focus, .input-field textarea:focus {
            outline: none;
            border-color: #58A6FF;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
        }

        .demo-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #6B7B96;
        }

        .field-hint {
            display: block;
            font-size: 11px;
            color: #6B7B96;
            margin-top: 5px;
            margin-left: 10px;
        }

        .password-strength {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            background: #2D3A5E;
            border-radius: 3px;
        }

        .strength-bar.weak { background: #EF4444; }
        .strength-bar.fair { background: #F59E0B; }
        .strength-bar.good { background: #58A6FF; }
        .strength-bar.strong { background: #22C55E; }

        .terms-checkbox {
            margin: 20px 0;
        }

        .terms-checkbox label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #8B9BB5;
            cursor: pointer;
        }

        .terms-checkbox a {
            color: #58A6FF;
            text-decoration: none;
        }

        /* Dashboard Styles */
        .app-container {
            min-height: 100vh;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(11, 15, 28, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(88, 166, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-search {
            display: flex;
            align-items: center;
            background: #111827;
            border-radius: 40px;
            padding: 8px 16px;
            width: 300px;
        }

        .nav-search i {
            color: #58A6FF;
            margin-right: 10px;
        }

        .nav-search input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
        }

        .nav-search input:focus {
            outline: none;
        }

        .nav-user {
            position: relative;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .user-dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: #111827;
            border-radius: 16px;
            padding: 16px;
            min-width: 260px;
            display: none;
            border: 1px solid #2D3A5E;
            z-index: 200;
        }

        .user-dropdown.show {
            display: block;
        }

        .dropdown-header {
            text-align: center;
            padding-bottom: 12px;
        }

        .dropdown-header i {
            font-size: 48px;
            color: #58A6FF;
        }

        .dropdown-header strong {
            display: block;
            margin-top: 8px;
        }

        .dropdown-divider {
            height: 1px;
            background: #2D3A5E;
            margin: 12px 0;
        }

        .dropdown-info p {
            margin: 8px 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8B9BB5;
        }

        .dropdown-info i {
            width: 20px;
            color: #58A6FF;
        }

        .dropdown-item {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
        }

        .dropdown-item:hover {
            background: #1E293B;
        }

        .main-layout {
            display: flex;
        }

        .sidebar-compact {
            width: 90px;
            background: rgba(11, 15, 28, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(88, 166, 255, 0.15);
            height: calc(100vh - 73px);
            position: sticky;
            top: 73px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 16px;
        }

        .nav-item {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: #8B9BB5;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item span {
            font-size: 10px;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #58A6FF20, #A855F720);
            color: #58A6FF;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .content-area {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: calc(100vh - 73px);
        }

        .view {
            display: none;
            animation: fadeIn 0.3s;
        }

        .view.active {
            display: block;
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .view-header h2 {
            font-size: 24px;
        }

        .date-chip {
            background: #111827;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
        }

        .fab-btn {
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111827;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #2D3A5E;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card i {
            font-size: 32px;
            color: #58A6FF;
        }

        .stat-card h3 {
            font-size: 28px;
        }

        .stat-card p {
            font-size: 12px;
            color: #8B9BB5;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2D3A5E;
            border-radius: 4px;
            margin-top: 8px;
        }

        .progress-bar div {
            height: 100%;
            background: linear-gradient(90deg, #58A6FF, #A855F7);
            border-radius: 4px;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #1E293B, #0F172A);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .welcome-text h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .welcome-text h3 span {
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-text p {
            color: #8B9BB5;
            font-size: 13px;
        }

        .mini-stat {
            text-align: center;
            background: #111827;
            padding: 10px 20px;
            border-radius: 16px;
        }

        .mini-stat i {
            font-size: 20px;
            color: #58A6FF;
        }

        .mini-stat span {
            display: block;
            font-size: 24px;
            font-weight: 700;
        }

        .mini-stat small {
            font-size: 11px;
            color: #8B9BB5;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-item {
            background: #111827;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 16px;
            border: 1px solid #2D3A5E;
            position: relative;
        }

        .project-icon i {
            font-size: 32px;
            color: #58A6FF;
        }

        .project-info h4 {
            margin-bottom: 8px;
        }

        .project-info p {
            font-size: 13px;
            color: #8B9BB5;
        }

        .project-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
        }

        .delete-icon {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: #EF4444;
            cursor: pointer;
        }

        .tasks-board {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: #111827;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #58A6FF;
        }

        .task-card.overdue {
            border-left-color: #F97316;
            background: #1A1525;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .task-check {
            cursor: pointer;
            color: #58A6FF;
        }

        .task-title {
            font-weight: 500;
        }

        .task-title.completed {
            text-decoration: line-through;
            color: #8B9BB5;
        }

        .task-meta {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            flex-wrap: wrap;
        }

        .priority-low { color: #4ADE80; }
        .priority-medium { color: #FBBF24; }
        .priority-high { color: #F87171; }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            border: none;
            cursor: pointer;
        }

        .status-pending { background: #F59E0B20; color: #FBBF24; }
        .status-in-progress { background: #3B82F620; color: #60A5FA; }
        .status-completed { background: #22C55E20; color: #4ADE80; }

        .delete-task {
            background: transparent;
            border: none;
            color: #EF4444;
            cursor: pointer;
        }

        .task-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 6px 16px;
            background: #111827;
            border: 1px solid #2D3A5E;
            border-radius: 30px;
            color: #8B9BB5;
            cursor: pointer;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            color: white;
            border: none;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .team-member {
            background: #111827;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #2D3A5E;
        }

        .member-avatar i {
            font-size: 48px;
            color: #58A6FF;
        }

        .member-info h4 {
            margin-bottom: 5px;
        }

        .member-info p {
            font-size: 12px;
            color: #8B9BB5;
        }

        .member-dept {
            margin-top: 5px;
        }

        .member-role {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-top: 8px;
        }

        .member-role.admin { background: #EF444420; color: #F87171; }
        .member-role.member { background: #22C55E20; color: #4ADE80; }

        .activity-list {
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #1E293B;
        }

        .activity-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .activity-icon.pending { background: #F59E0B; }
        .activity-icon.completed { background: #22C55E; }
        .activity-icon.in-progress { background: #3B82F6; }

        .activity-content {
            flex: 1;
        }

        .activity-content strong {
            display: block;
            margin-bottom: 4px;
        }

        .activity-content span {
            font-size: 11px;
            color: #8B9BB5;
        }

        /* Profile View */
        .profile-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .profile-card {
            background: #111827;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #2D3A5E;
        }

        .profile-avatar {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar i {
            font-size: 80px;
            color: #58A6FF;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #1E293B;
        }

        .info-row label {
            width: 100px;
            font-weight: 600;
            color: #8B9BB5;
        }

        .info-row p {
            flex: 1;
        }

        .profile-stats-card {
            background: #111827;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #2D3A5E;
        }

        .profile-stats-card h3 {
            margin-bottom: 20px;
        }

        .profile-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .profile-stat {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #0A0E1A;
            border-radius: 16px;
        }

        .profile-stat i {
            font-size: 28px;
            color: #58A6FF;
        }

        .profile-stat h4 {
            font-size: 20px;
        }

        .profile-stat p {
            font-size: 11px;
            color: #8B9BB5;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-modern {
            background: #111827;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #58A6FF;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #2D3A5E;
        }

        .modal-close {
            background: transparent;
            border: none;
            font-size: 28px;
            color: #8B9BB5;
            cursor: pointer;
        }

        .modal-modern form {
            padding: 24px;
        }

        .modal-modern input, .modal-modern textarea, .modal-modern select {
            width: 100%;
            padding: 12px;
            background: #0A0E1A;
            border: 1px solid #2D3A5E;
            border-radius: 12px;
            color: white;
            margin-bottom: 16px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #58A6FF, #A855F7);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #8B9BB5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .auth-grid {
                flex-direction: column;
            }
            .sidebar-compact {
                display: none;
            }
            .profile-container {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .top-nav {
                padding: 12px 16px;
            }
            .nav-search {
                width: 150px;
            }
            .content-area {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script src="/static/js/main.js"></script>
</body>
</html>
